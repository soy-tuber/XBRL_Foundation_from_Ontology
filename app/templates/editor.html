<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有価証券報告書エディタ</title>
<style>
  :root {
    --bg: #0e1117; --bg2: #1a1d24; --bg3: #262b36;
    --text: #e0e0e0; --text-dim: #888; --accent: #4da6ff;
    --success: #4caf50; --border: #333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { color: var(--text-dim); font-size: 13px; }

  #sections { max-width: 1600px; margin: 0 auto; padding: 16px; }

  .section-row {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .section-header {
    padding: 10px 16px; background: var(--bg3); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .section-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
  .section-header .code { color: var(--text-dim); font-size: 12px; font-family: monospace; }
  .section-header .toggle { color: var(--text-dim); font-size: 12px; }

  .section-body { display: none; }
  .section-row.open .section-body { display: block; }
  .section-row.open .toggle::after { content: '▲'; }
  .section-row:not(.open) .toggle::after { content: '▼'; }

  .cols {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
    background: var(--border);
  }
  .col { background: var(--bg2); padding: 12px; display: flex; flex-direction: column; }
  .col-label {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  textarea {
    width: 100%; min-height: 200px; resize: vertical;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px; font-size: 13px; line-height: 1.6;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .peer-content {
    max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6;
  }
  .peer-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .peer-item:last-child { border-bottom: none; }
  .peer-label { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .peer-text { white-space: pre-wrap; font-size: 12px; color: var(--text-dim); }

  .btn {
    padding: 6px 14px; border: none; border-radius: 4px;
    font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: wait; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; }

  .status { font-size: 11px; color: var(--text-dim); margin-top: 4px; min-height: 16px; }
  .status.saving { color: var(--success); }

  .loading { text-align: center; padding: 24px; color: var(--text-dim); }

  @media (max-width: 900px) {
    .cols { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>有価証券報告書エディタ</h1>
  <span class="subtitle">セクションごとに記載例を参照しながらドラフトを作成</span>
</header>

<div id="sections"><div class="loading">セクション読み込み中...</div></div>

<script>
const STORAGE_KEY = 'yuho_editor_drafts';

function loadDrafts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}

function saveDraft(code, text) {
  const drafts = loadDrafts();
  drafts[code] = text;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(drafts));
}

function loadAiOutputs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY + '_ai') || '{}'); } catch { return {}; }
}

function saveAiOutput(code, text) {
  const outputs = loadAiOutputs();
  outputs[code] = text;
  localStorage.setItem(STORAGE_KEY + '_ai', JSON.stringify(outputs));
}

let debounceTimers = {};
function debounceSave(code, text) {
  clearTimeout(debounceTimers[code]);
  debounceTimers[code] = setTimeout(() => saveDraft(code, text), 500);
}

async function loadTaxonomy() {
  const resp = await fetch('/api/taxonomy');
  return resp.json();
}

async function loadPeers(code, container, btn) {
  btn.disabled = true;
  btn.textContent = '読み込み中...';
  try {
    const resp = await fetch(`/api/peers/${code}?limit=5`);
    const peers = await resp.json();
    if (!peers.length) {
      container.innerHTML = '<div style="color:var(--text-dim)">記載例なし</div>';
      return;
    }
    container.innerHTML = peers.map(p =>
      `<div class="peer-item">
        <div class="peer-label">${p.sec_code} ${p.company_name} (${p.period_end})</div>
        <div class="peer-text">${escapeHtml(p.content_text)}</div>
      </div>`
    ).join('');
  } catch (e) {
    container.innerHTML = `<div style="color:red">エラー: ${e.message}</div>`;
  } finally {
    btn.textContent = '記載例を更新';
    btn.disabled = false;
  }
}

async function generateAi(code, nameJa, draftEl, aiEl, statusEl, btn) {
  btn.disabled = true;
  statusEl.textContent = 'AI 生成中...';
  statusEl.className = 'status';

  // collect peer texts from loaded peers
  const peerTexts = [];
  const peerItems = document.querySelectorAll(`.section-row[data-code="${code}"] .peer-text`);
  peerItems.forEach(el => peerTexts.push(el.textContent));

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        section_code: code,
        section_name_ja: nameJa,
        draft_text: draftEl.value,
        peer_texts: peerTexts,
      }),
    });
    const data = await resp.json();
    aiEl.value = data.output_text || '';
    saveAiOutput(code, aiEl.value);
    statusEl.textContent = '生成完了';
    statusEl.className = 'status saving';
  } catch (e) {
    statusEl.textContent = `エラー: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

function copyToDraft(code, aiEl, draftEl, statusEl) {
  draftEl.value = aiEl.value;
  saveDraft(code, draftEl.value);
  statusEl.textContent = 'ドラフトに反映しました';
  statusEl.className = 'status saving';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderSection(sec, drafts, aiOutputs) {
  const code = sec.section_code;
  const row = document.createElement('div');
  row.className = 'section-row';
  row.dataset.code = code;

  row.innerHTML = `
    <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
      <h3>${sec.section_name_ja}</h3>
      <span class="code">${code}</span>
      <span class="toggle"></span>
    </div>
    <div class="section-body">
      <div class="cols">
        <div class="col">
          <div class="col-label">記載例（同業他社）</div>
          <div class="peer-content" id="peers-${code}">
            <div style="color:var(--text-dim)">「記載例を表示」で読み込み</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary" id="peer-btn-${code}">記載例を表示</button>
          </div>
        </div>
        <div class="col">
          <div class="col-label">ドラフト（入力）</div>
          <textarea id="draft-${code}" placeholder="ここにドラフトを入力...">${escapeHtml(drafts[code] || '')}</textarea>
          <div class="status" id="draft-status-${code}"></div>
        </div>
        <div class="col">
          <div class="col-label">AI 出力</div>
          <textarea id="ai-${code}" placeholder="AI生成ボタンで出力されます">${escapeHtml(aiOutputs[code] || '')}</textarea>
          <div class="btn-row">
            <button class="btn btn-primary" id="gen-btn-${code}">AI 生成</button>
            <button class="btn btn-secondary" id="copy-btn-${code}">ドラフトに反映</button>
          </div>
          <div class="status" id="ai-status-${code}"></div>
        </div>
      </div>
    </div>
  `;

  // events
  const draftEl = row.querySelector(`#draft-${code}`);
  const aiEl = row.querySelector(`#ai-${code}`);
  const draftStatus = row.querySelector(`#draft-status-${code}`);
  const aiStatus = row.querySelector(`#ai-status-${code}`);
  const peerContainer = row.querySelector(`#peers-${code}`);
  const peerBtn = row.querySelector(`#peer-btn-${code}`);
  const genBtn = row.querySelector(`#gen-btn-${code}`);
  const copyBtn = row.querySelector(`#copy-btn-${code}`);

  draftEl.addEventListener('input', () => {
    debounceSave(code, draftEl.value);
    draftStatus.textContent = '保存中...';
    draftStatus.className = 'status';
    clearTimeout(draftEl._saveTimer);
    draftEl._saveTimer = setTimeout(() => {
      draftStatus.textContent = '保存済み';
      draftStatus.className = 'status saving';
    }, 600);
  });

  aiEl.addEventListener('input', () => saveAiOutput(code, aiEl.value));
  peerBtn.addEventListener('click', () => loadPeers(code, peerContainer, peerBtn));
  genBtn.addEventListener('click', () => generateAi(code, sec.section_name_ja, draftEl, aiEl, aiStatus, genBtn));
  copyBtn.addEventListener('click', () => copyToDraft(code, aiEl, draftEl, draftStatus));

  return row;
}

async function init() {
  const container = document.getElementById('sections');
  try {
    const sections = await loadTaxonomy();
    const drafts = loadDrafts();
    const aiOutputs = loadAiOutputs();
    container.innerHTML = '';
    sections.forEach(sec => {
      container.appendChild(renderSection(sec, drafts, aiOutputs));
    });
  } catch (e) {
    container.innerHTML = `<div class="loading" style="color:red">読み込みエラー: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
